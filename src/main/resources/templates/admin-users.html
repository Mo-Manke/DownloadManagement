<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理员管理 - 安装包管理系统</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<!-- 导航栏 -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/admin" class="navbar-brand">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
      </svg>
      APK管理
    </a>
    <button class="navbar-toggle" onclick="toggleMenu()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
    <div class="navbar-menu" id="navMenu">
      <a href="/admin">安装包管理</a>
      <a href="/dashboard">仪表盘</a>
      <a href="/admin/ip">IP控制</a>
      <a href="/profile">个人资料</a>
      <a href="/admin/users" class="active">管理员管理</a>
      <a href="/admin/requests">审批请求</a>
    </div>
    <div class="navbar-user" id="navUser">
      <div class="navbar-user-info">
        <span class="avatar" th:text="${#strings.substring(username, 0, 1).toUpperCase()}">A</span>
        <span th:text="${username}">admin</span>
      </div>
      <a href="/logout" class="btn-logout">退出登录</a>
    </div>
  </div>
</nav>

<div class="container" style="max-width:1000px;">
  <div class="page-header">
    <h1>管理员管理</h1>
    <p>管理系统管理员账户（仅超级管理员可见）</p>
  </div>

  <!-- 新增管理员 -->
  <div class="card" style="margin-bottom:20px;">
    <div class="card-header">
      <h3>新增管理员</h3>
    </div>
    <div class="card-body">
      <form method="post" action="/admin/users">
        <div class="form-row">
          <div class="form-group" style="flex:1;">
            <label>用户名</label>
            <input type="text" name="username" class="form-control" placeholder="输入用户名" required />
          </div>
          <div class="form-group" style="flex:1;">
            <label>密码</label>
            <input type="password" name="password" class="form-control" placeholder="输入密码" required />
          </div>
          <div class="form-group" style="flex:1;">
            <label>角色</label>
            <select name="role" class="form-control">
              <option value="ADMIN">普通管理员</option>
              <option value="SUPER_ADMIN">超级管理员</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>
          添加管理员
        </button>
      </form>
    </div>
  </div>

  <!-- 管理员列表 -->
  <div class="card">
    <div class="card-header">
      <h3>管理员列表</h3>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>用户名</th>
            <th>角色</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="u: ${users}">
            <td style="color:var(--secondary);" th:text="'#' + ${u.id}">#1</td>
            <td style="font-weight:500;" th:text="${u.username}">name</td>
            <td>
              <span class="badge" th:classappend="${u.role.name()=='SUPER_ADMIN' ? 'badge-warning' : 'badge-info'}" th:text="${u.role.name()=='SUPER_ADMIN' ? '超级管理员' : '普通管理员'}">ADMIN</span>
            </td>
            <td>
              <span class="badge" th:classappend="${u.enabled ? 'badge-success' : 'badge-danger'}" th:text="${u.enabled ? '已启用' : '已禁用'}">启用</span>
            </td>
            <td>
              <form th:action="@{'/admin/users/' + ${u.id} + '/update'}" method="post" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                <input type="password" name="password" class="form-control" placeholder="新密码" style="width:120px;" />
                <select name="role" class="form-control" style="width:auto;">
                  <option value="ADMIN" th:selected="${u.role.name()=='ADMIN'}">普通</option>
                  <option value="SUPER_ADMIN" th:selected="${u.role.name()=='SUPER_ADMIN'}">超级</option>
                </select>
                <select name="enabled" class="form-control" style="width:auto;">
                  <option value="true" th:selected="${u.enabled}">启用</option>
                  <option value="false" th:selected="${!u.enabled}">禁用</option>
                </select>
                <button type="submit" class="btn btn-sm btn-primary">保存</button>
              </form>
              <form th:action="@{'/admin/users/' + ${u.id} + '/delete'}" method="post" style="margin-top:8px;" onsubmit="return confirm('确认删除该管理员？此操作不可恢复。')">
                <button type="submit" class="btn btn-sm btn-danger">删除</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
function toggleMenu() {
  document.getElementById('navMenu').classList.toggle('active');
  document.getElementById('navUser').classList.toggle('active');
}
</script>
</body>
</html>
