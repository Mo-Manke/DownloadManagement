<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 - 安装包管理系统</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 40px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        .login-logo svg { width: 32px; height: 32px; color: #fff; }
        .login-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 4px;
        }
        .login-header p {
            color: var(--secondary);
            font-size: 14px;
        }
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .alert-success { background: #dcfce7; color: #166534; }
        .alert-error { background: #fee2e2; color: #991b1b; }
        .captcha-row {
            display: flex;
            gap: 12px;
            align-items: stretch;
        }
        .captcha-row input { flex: 1; }
        .captcha-img {
            height: 44px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
        }
        .captcha-img:hover { border-color: var(--primary); }
        .remember-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 16px 0;
        }
        .remember-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
            cursor: pointer;
        }
        .remember-row label {
            font-size: 14px;
            color: var(--secondary);
            cursor: pointer;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: var(--secondary);
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .forgot-form input {
            margin-bottom: 12px;
        }
        .btn-forgot {
            background: var(--secondary);
        }
        .btn-forgot:hover { background: #475569; }
        @media (max-width: 480px) {
            .login-card { padding: 24px; }
            .login-header h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
            </div>
            <h1>安装包管理系统</h1>
            <p>请登录您的账户</p>
        </div>
        
        <div th:if="${param.changed}" class="alert alert-success">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            密码修改成功，请使用新密码登录
        </div>
        
        <form method="post" action="/login">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" class="form-control" placeholder="请输入用户名" required autofocus />
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" class="form-control" placeholder="请输入密码" required />
            </div>
            <div class="form-group">
                <label>验证码</label>
                <div class="captcha-row">
                    <input type="text" name="captcha" class="form-control" placeholder="计算结果" required />
                    <img src="/captcha" alt="captcha" class="captcha-img" onclick="this.src='/captcha?'+Date.now()" title="点击刷新" />
                </div>
            </div>
            <div class="remember-row">
                <input type="checkbox" id="remember-me" name="remember-me" />
                <label for="remember-me">保持登录状态</label>
            </div>
            <button class="btn btn-primary" type="submit" style="width:100%;">登 录</button>
        </form>
        
        <div class="divider">忘记密码？</div>
        
        <form method="post" action="/auth/forgot" class="forgot-form">
            <input type="text" name="username" class="form-control" placeholder="输入用户名提交找回请求" />
            <button class="btn btn-forgot" type="submit" style="width:100%;">提交找回请求</button>
        </form>
    </div>
</div>
</body>
</html>
